<div class="welcome-container">
  <mat-card class="welcome-card">
    <mat-card-header>
      <mat-icon class="welcome-icon">restaurant</mat-icon>
      <mat-card-title>Bienvenue sur MidiVote !</mat-card-title>
      <mat-card-subtitle>Organise tes déjeuners entre collègues</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p class="welcome-text">
        Pour commencer, dis-nous comment tu t'appelles :
      </p>

      <form (ngSubmit)="onSubmit()" class="welcome-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Prénom</mat-label>
          <input matInput [(ngModel)]="firstName" name="firstName"
                 placeholder="Ton prénom" required autofocus>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nom</mat-label>
          <input matInput [(ngModel)]="lastName" name="lastName"
                 placeholder="Ton nom (optionnel)">
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit"
                [disabled]="!isValid" class="submit-btn">
          <mat-icon>arrow_forward</mat-icon>
          C'est parti !
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
